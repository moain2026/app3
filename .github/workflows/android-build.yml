# ──────────────────────────────────────────────────────────────────────────
# Android APK Build — العباسي تحصيل
#
# This is a *bare* React Native 0.74.5 project (NOT Expo managed), so we build
# the APK directly with Gradle instead of EAS. The release variant is signed
# with the bundled debug.keystore — good enough for internal field testing.
# (Swap to a real upload keystore via secrets before any production release.)
#
# Trigger:
#   • Manually (workflow_dispatch) — recommended for "build me a test APK now".
#   • On push to main that touches app code.
#
# Output:
#   • A downloadable artifact `abbasi-tahseel-release-apk` containing the APK.
# ──────────────────────────────────────────────────────────────────────────
name: Android Build (APK)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build variant'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'App.tsx'
      - 'index.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-build.yml'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Determine build variant
        id: variant
        run: |
          VARIANT="${{ github.event.inputs.build_type }}"
          if [ -z "$VARIANT" ]; then VARIANT="release"; fi
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"
          # Gradle task name: assembleRelease / assembleDebug
          TASK="assemble$(echo ${VARIANT^})"
          echo "task=$TASK" >> "$GITHUB_OUTPUT"

      - name: Build APK (${{ steps.variant.outputs.variant }})
        working-directory: android
        run: ./gradlew ${{ steps.variant.outputs.task }} --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Found APK: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abbasi-tahseel-${{ steps.variant.outputs.variant }}-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14
          if-no-files-found: error
